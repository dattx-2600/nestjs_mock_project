services:
  mysqldb:
    image: mysql:8.0
    container_name: mock_mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mock_db
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

  redisdb:
    image: redis:7.0-alpine
    container_name: mock_redis_container
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  mock-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nest_api_mock
    env_file:
      - .env
    restart: always
    ports:
      - '3000:3000'
    environment:
      - DATABASE_HOST=mysqldb
      - DATABASE_PORT=3306
      - DATABASE_USER=root
      - DATABASE_PASSWORD=root
      - DATABASE_NAME=mock_db
      - REDIS_HOST=redisdb
      - REDIS_PORT=6379
    command: npm run start:dev
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
      - ./uploads:/usr/src/app/uploads
    depends_on:
      - mysqldb
      - redisdb

volumes:
  mysql_data:
  redis_data: